#ersion: '3.8'

services:
  postgis:
    image: postgis/postgis:15-3.4
    container_name: spatial_perf_db
    environment:
      POSTGRES_DB: spatial_perf
      POSTGRES_USER: gisuser
      POSTGRES_PASSWORD: gispass
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: postgres -c shared_buffers=256MB -c work_mem=64MB -c max_connections=200

volumes:
  pgdata: